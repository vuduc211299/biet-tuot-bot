name: Build & Deploy to EC2

on:
  push:
    branches: [main]

env:
  AWS_REGION: ap-southeast-1
  ECR_REPOSITORY: biettuotbot

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag & push image
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG -t $ECR_REGISTRY/$ECR_REPOSITORY:latest .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

      - name: Deploy to EC2
        env:
          ECR_IMAGE: ${{ steps.ecr-login.outputs.registry }}/biettuotbot:latest
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: ECR_IMAGE
          script: |
            # Pull latest image (ECR credential helper handles auth via instance profile)
            docker pull $ECR_IMAGE

            # Stop old container, start new one
            docker stop biettuotbot 2>/dev/null || true
            docker rm biettuotbot 2>/dev/null || true
            docker run -d \
              --name biettuotbot \
              --restart unless-stopped \
              --env-file /home/ec2-user/biettuotbot/.env \
              -p 3001:3001 \
              --log-driver json-file \
              --log-opt max-size=10m \
              --log-opt max-file=3 \
              $ECR_IMAGE

            # Clean old images
            docker image prune -af
